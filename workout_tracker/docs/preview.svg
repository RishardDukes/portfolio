    <text x="262" y="302" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">225 lb</text>
    <text x="410" y="267" fill="#a8b6cc" font-family="Arial, Helvetica, sans-serif" font-size="14">Sessions</text>
    <text x="410" y="302" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">24</text>
  </g>


<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Workout Tracker Preview</title>
  <desc id="desc">Illustrated preview of the Workout Intelligence Platform showing dashboard, tracker, programs, and Hercules AI.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="100%" stop-color="#16243c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f8cff"/>
      <stop offset="100%" stop-color="#2ecc71"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000814" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="180" cy="120" r="180" fill="#1c3358" opacity="0.28"/>
  <circle cx="1040" cy="640" r="220" fill="#0d5f4c" opacity="0.22"/>

  <rect x="52" y="32" rx="22" ry="22" width="1096" height="76" fill="#091425" stroke="#21324e" opacity="0.96"/>
  <circle cx="92" cy="70" r="18" fill="url(#accent)"/>
  <text x="122" y="77" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Hercules</text>
  <rect x="830" y="51" rx="14" ry="14" width="90" height="36" fill="#12233c" stroke="#274165"/>
  <rect x="934" y="51" rx="14" ry="14" width="80" height="36" fill="#12233c" stroke="#274165"/>
  <rect x="1028" y="51" rx="14" ry="14" width="92" height="36" fill="#17335c" stroke="#3d67a8"/>
  <text x="855" y="74" fill="#c7d2e5" font-family="Arial, Helvetica, sans-serif" font-size="14">Dashboard</text>
  <text x="955" y="74" fill="#c7d2e5" font-family="Arial, Helvetica, sans-serif" font-size="14">Tracker</text>
  <text x="1056" y="74" fill="#e2ebff" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">Programs</text>

  <text x="70" y="78" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Workout Intelligence Platform</text>
  <text x="70" y="132" fill="#a8b6cc" font-family="Arial, Helvetica, sans-serif" font-size="19">Dashboard, tracker, programs, and Hercules AI coaching in one product workflow</text>

  <g filter="url(#shadow)">
    <rect x="64" y="174" rx="26" ry="26" width="500" height="230" fill="#0f172a" stroke="#21324e"/>
    <rect x="596" y="174" rx="26" ry="26" width="540" height="230" fill="#0f172a" stroke="#21324e"/>
    <rect x="64" y="436" rx="26" ry="26" width="330" height="220" fill="#0f172a" stroke="#21324e"/>

    <rect x="866" y="240" rx="16" ry="16" width="240" height="48" fill="#111f36" stroke="#274165"/>
    <rect x="626" y="306" rx="16" ry="16" width="480" height="58" fill="#111f36" stroke="#274165"/>
    <rect x="626" y="380" rx="18" ry="18" width="130" height="32" fill="#17335c"/>
    <rect x="772" y="380" rx="18" ry="18" width="124" height="32" fill="#17335c"/>
    <rect x="912" y="380" rx="18" ry="18" width="144" height="32" fill="#17335c"/>
    <text x="646" y="271" fill="#a8b6cc" font-family="Arial, Helvetica, sans-serif" font-size="15">Load from plan</text>
    <text x="886" y="271" fill="#a8b6cc" font-family="Arial, Helvetica, sans-serif" font-size="15">Bench Press</text>
    <text x="646" y="342" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="18">Optional quick-fill for sets, reps, split, and exercise</text>
    <text x="654" y="401" fill="#dbeafe" font-family="Arial, Helvetica, sans-serif" font-size="14">Bench 4×8</text>
    <text x="800" y="401" fill="#dbeafe" font-family="Arial, Helvetica, sans-serif" font-size="14">OHP 3×10</text>
    <text x="940" y="401" fill="#dbeafe" font-family="Arial, Helvetica, sans-serif" font-size="14">Dips 3×12</text>
  </g>

  <g>

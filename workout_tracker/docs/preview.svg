    <rect x="94" y="572" rx="14" ry="14" width="270" height="42" fill="#13233c"/>
    <rect x="94" y="624" rx="14" ry="14" width="270" height="42" fill="#13233c"/>
    <text x="116" y="532" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="18">Push Pull Legs</text>

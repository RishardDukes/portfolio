    <text x="116" y="650" fill="#a8b6cc" font-family="Arial, Helvetica, sans-serif" font-size="15">Pull A</text>
  </g>

  <g>
    <rect x="456" y="504" rx="18" ry="18" width="646" height="132" fill="#111f36" stroke="#274165"/>
    <rect x="978" y="520" rx="14" ry="14" width="94" height="28" fill="#0d3c31"/>
    <text x="1000" y="539" fill="#b8f5dd" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700">RESEARCH</text>
    <text x="486" y="542" fill="#8ab4ff" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Volume Prescription</text>
    <text x="486" y="580" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Your Push volume is slightly below target this week.</text>
    <text x="486" y="612" fill="#a8b6cc" font-family="Arial, Helvetica, sans-serif" font-size="17">Add one more chest movement or an extra working set if recovery stays solid.</text>
    <text x="486" y="650" fill="#6ee7b7" font-family="Arial, Helvetica, sans-serif" font-size="15">Source: PubMed Central research linked in dashboard</text>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Offline | Hercules</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111c30;
      --text: #e2e8f0;
      --sub: #94a3b8;
      --accent: #4f8ef7;
      --border: #1e2d45;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% 20%, #152742 0, var(--bg) 55%);
      padding: 24px;
    }
    .panel {
      width: min(560px, 100%);
      background: rgba(17, 28, 48, 0.9);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.45);
    }
    h1 { margin: 0 0 8px; font-size: 1.4rem; }
    p { margin: 0 0 12px; color: var(--sub); line-height: 1.5; }
    .pill {
      display: inline-block;
      margin-bottom: 12px;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #dbeafe;
      background: rgba(79, 142, 247, 0.2);
      border: 1px solid rgba(79, 142, 247, 0.45);
      padding: 5px 10px;
      border-radius: 999px;
    }
    .btn {
      display: inline-block;
      margin-top: 8px;
      color: #fff;
      text-decoration: none;
      background: var(--accent);
      border: 1px solid var(--accent);
      padding: 9px 14px;
      border-radius: 10px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="panel">
    <span class="pill">Offline Mode</span>
    <h1>You are currently offline.</h1>
    <p>Hercules could not reach the network, but your installed app shell is still available.</p>
    <p>Reconnect and refresh to sync new workout logs and fetch updated coaching insights.</p>
    <a class="btn" href="/dashboard">Return to Dashboard</a>
  </main>
</body>
</html>

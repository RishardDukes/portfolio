{% extends "base.html" %}
{% block title %}Register · Workout Tracker{% endblock %}
{% block content %}
<style>
  .auth-wrap { max-width: 520px; margin: 0 auto; display: grid; gap: 1rem; }
  .auth-card { border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 1.1rem; background: rgba(255,255,255,0.03); }
  .auth-card h2 { margin-top: 0; }
  .auth-form { display: grid; gap: 0.9rem; }
  .auth-form button { width: 100%; }
  .helper { color: var(--muted); margin: 0; }
</style>
<div class="auth-wrap">
  <div class="auth-card">
    <h2>Create your account</h2>
    <p class="helper">Track every lift and let Hercules handle the progression prompts.</p>
    <form method="POST" class="auth-form">
      <div>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required />
      </div>
      <div>
        <label for="display_name">Display name</label>
        <input id="display_name" name="display_name" placeholder="Rishard" />
      </div>
      <div>
        <label for="password">Password</label>
        <input id="password" type="password" name="password" placeholder="At least 8 characters" required />
      </div>
      <div>
        <label for="confirm">Confirm password</label>
        <input id="confirm" type="password" name="confirm" placeholder="Repeat password" required />
      </div>
      <button type="submit">Create account</button>
    </form>
  </div>
  <p class="helper">Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a>.</p>
</div>
{% endblock %}

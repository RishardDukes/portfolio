{% extends "base.html" %}
{% block title %}Login · Workout Tracker{% endblock %}
{% block content %}
<style>
  .auth-wrap { max-width: 460px; margin: 0 auto; display: grid; gap: 1rem; }
  .auth-card { border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 1.1rem; background: rgba(255,255,255,0.03); }
  .auth-card h2 { margin-top: 0; }
  .auth-form { display: grid; gap: 0.9rem; }
  .auth-form button { width: 100%; }
  .helper { color: var(--muted); margin: 0; }
</style>
<div class="auth-wrap">
  <div class="auth-card">
    <h2>Log in</h2>
    <p class="helper">Pick up right where you left off.</p>
    <form method="POST" class="auth-form">
      <div>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required />
      </div>
      <div>
        <label for="password">Password</label>
        <input id="password" type="password" name="password" placeholder="••••••••" required />
      </div>
      <button type="submit">Log in</button>
    </form>
  </div>
  <p class="helper">New here? <a href="{{ url_for('auth.register') }}">Create an account</a>.</p>
</div>
{% endblock %}
